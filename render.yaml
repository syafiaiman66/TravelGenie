services:
  - type: web
    name: travelgenie
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: COOKIE_SECURE
        value: "true"
      - key: DATA_DIR
        value: .
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
